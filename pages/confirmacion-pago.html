<!-- GARANTÍAS > CARGUES > Confirmación de pago -->
<div class="breadcrumb">
  <a href="#" onclick="navTo('inicio');return false">Inicio</a>
  <span class="sep">/</span>
  <a href="#" onclick="navTo('cargues');return false">Garantías</a>
  <span class="sep">/</span>
  <a href="#" onclick="navTo('cargues2');return false">Cargues</a>
  <span class="sep">/</span>
  <span>Confirmación de pago</span>
</div>

<div class="step-card" style="text-align:center;padding:3rem 2rem;max-width:560px;margin:2rem auto">
  <span class="material-symbols-rounded" style="font-size:4rem;color:#059669;margin-bottom:1rem;display:block">check_circle</span>
  <h2 style="margin:0 0 0.75rem;font-size:1.5rem;font-weight:700">¡Soporte de pago cargado!</h2>
  <p style="color:var(--gray-500);font-size:0.95rem;max-width:400px;margin:0 auto 2rem">
    Tu soporte de pago fue subido correctamente. El estado del cargue ha sido actualizado a <strong>Pagado</strong>.
  </p>

  <table class="confirm-table" style="max-width:360px;margin:0 auto 2rem">
    <tr><td>ID de cargue</td><td id="cp-id">—</td></tr>
    <tr><td>Fecha de cargue</td><td id="cp-fecha">—</td></tr>
    <tr><td>Cobertura</td><td id="cp-cobertura">—</td></tr>
    <tr><td>Comisión total</td><td id="cp-total">—</td></tr>
    <tr><td>Estado</td><td><span class="badge badge-pagado">Pagado</span></td></tr>
  </table>

  <div style="display:flex;gap:1rem;justify-content:center">
    <button class="btn btn-ghost" onclick="navTo('inicio')">Ir a inicio</button>
    <button class="btn btn-filled" onclick="navTo('cargues')">
      <span class="material-symbols-rounded">list_alt</span> Ver mis cargues
    </button>
  </div>
</div>

<script>
  (function poblarConfirmacion() {
    var c = cargues.find(function(x) { return x.estado === 'Pagado'; }) || cargues[0];
    if (!c) return;
    document.getElementById('cp-id').textContent       = '#' + c.id;
    document.getElementById('cp-fecha').textContent    = c.fecha;
    document.getElementById('cp-cobertura').textContent = c.cobertura;
    document.getElementById('cp-total').textContent    = c.total;
  })();
</script>
