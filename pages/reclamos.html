<!-- GARANTÍAS > RECLAMOS -->
<div class="breadcrumb">
  <a href="#" onclick="navTo('inicio');return false">Inicio</a>
  <span class="sep">/</span><a href="#">Garantías</a>
  <span class="sep">/</span><span>Reclamos</span>
</div>
<div class="page-header">
  <div>
    <div class="page-title">Reclamos de garantías</div>
    <div class="page-subtitle">Consulte, reclame y verifique el estado de sus reclamos</div>
  </div>
  <div class="page-actions">
    <button class="btn btn-filled" onclick="navTo('reclamar')">Reclamar</button>
  </div>
</div>

<div class="table-card">
  <div class="toolbar">
    <div class="search-box">
      <span class="material-icons">search</span>
      <input type="text" id="buscador-reclamos" placeholder="Buscador" oninput="renderReclamos()">
    </div>
    <div class="pills" id="pills-reclamos">
      <button class="pill active" onclick="filtrarReclamos('Todo',this)">Todo <span class="material-icons">close</span></button>
      <button class="pill" onclick="filtrarReclamos('Solicitado',this)">Solicitado</button>
      <button class="pill" onclick="filtrarReclamos('En proceso',this)">En proceso</button>
      <button class="pill" onclick="filtrarReclamos('Reclamado',this)">Reclamado</button>
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Fecha de reclamo</th>
        <th>Cobro parcial</th>
        <th>
          Cobro total
          <span class="tooltip-wrap" style="margin-left:4px">
            <button class="tooltip-icon-btn" type="button" tabindex="-1"><span class="material-icons">info</span></button>
            <span class="tooltip-box">Recuerda enviar los documentos de cobro total.</span>
          </span>
        </th>
        <th>Valor a reclamar</th>
        <th>Estado</th>
        <th>Opciones</th>
      </tr>
    </thead>
    <tbody id="tbody-reclamos"></tbody>
  </table>
</div>

<script>
  function renderReclamos() {
    const tbody = document.getElementById('tbody-reclamos');
    const query = (document.getElementById('buscador-reclamos').value || '').toLowerCase();
    tbody.innerHTML = '';

    reclamos.forEach(r => {
      const ok = (filtroReclamos === 'Todo' || r.estado === filtroReclamos)
                && (r.id.includes(query) || r.fecha.toLowerCase().includes(query));
      if (!ok) return;

      const badgeClass = { Solicitado: 'badge-cargado', 'En proceso': 'badge-pagado', Reclamado: 'badge-aprobado' }[r.estado] || 'badge-cargado';

      let btnPrincipal = '';
      if (r.estado === 'Solicitado') {
        btnPrincipal = `<button class="btn-accion" onclick="anularReclamo('${r.id}')"><span class="material-icons">cancel</span> Anular</button>`;
      } else if (r.estado === 'En proceso') {
        btnPrincipal = `<button class="btn-accion" onclick="closeMenus()"><span class="material-icons">visibility</span> Ver cobros</button>`;
      } else if (r.estado === 'Reclamado') {
        btnPrincipal = `<button class="btn-accion" onclick="closeMenus()"><span class="material-icons">download</span> Descargar soporte</button>`;
      }

      let dotsItems = `<button onclick="closeMenus()"><span class="material-icons">visibility</span> Ver detalle</button>`;
      if (r.estado === 'Solicitado') {
        dotsItems += `<div class="dots-divider"></div><button class="danger" onclick="anularReclamo('${r.id}')"><span class="material-icons">cancel</span> Anular</button>`;
      } else {
        dotsItems += `<button onclick="closeMenus()"><span class="material-icons">download</span> Descargar</button>`;
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="td-id">${r.id}</span></td>
        <td>${r.fecha}</td>
        <td style="text-align:center">${r.parcial}</td>
        <td style="text-align:center">${r.total} ${r.estado === 'Reclamado'
          ? `<span class="tooltip-wrap" style="margin-left:2px"><button class="tooltip-icon-btn" type="button" tabindex="-1"><span class="material-icons" style="font-size:14px;color:#15803d">check_circle</span></button><span class="tooltip-box">Documentos verificados.</span></span>`
          : `<span class="tooltip-wrap" style="margin-left:2px"><button class="tooltip-icon-btn" type="button" tabindex="-1"><span class="material-icons" style="font-size:13px;color:var(--gray-400)">info</span></button><span class="tooltip-box">Recuerda enviar los documentos de cobro total.</span></span>`
        }</td>
        <td><strong>${r.valor}</strong></td>
        <td><span class="badge ${badgeClass}">${r.estado}</span></td>
        <td>
          <div class="td-actions">
            ${btnPrincipal}
            <div style="position:relative">
              <button class="btn-dots" onclick="toggleDotsMenu('rdots-${r.id}',event)">···</button>
              <div class="dots-menu" id="rdots-${r.id}">${dotsItems}</div>
            </div>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });

    if (!tbody.children.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray-400)">No se encontraron resultados</td></tr>`;
    }
  }

  function filtrarReclamos(estado, btn) {
    filtroReclamos = estado;
    document.querySelectorAll('#pills-reclamos .pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderReclamos();
  }

  function anularReclamo(id) {
    const idx = reclamos.findIndex(r => r.id === id);
    if (idx !== -1) reclamos.splice(idx, 1);
    closeMenus();
    renderReclamos();
    showToast('Reclamo #' + id + ' anulado', 'info');
  }
</script>
