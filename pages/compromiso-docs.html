<!-- DOCUMENTOS PENDIENTES -->
<div class="breadcrumb">
  <a href="#" onclick="navTo('inicio');return false">Garantías</a>
  <span class="sep">/</span>
  <a href="#" onclick="navTo('reclamos');return false">Reclamos</a>
  <span class="sep">/</span>
  <span>Documentos pendientes</span>
</div>

<div class="page-header-row">
  <button class="btn-back" onclick="navTo('reclamos')">
    <span class="material-symbols-rounded">chevron_left</span>
  </button>
  <div class="page-title" style="margin-bottom:0">Documentos pendientes</div>
</div>

<!-- Barra de controles -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem;">
  <div class="search-box">
    <span class="material-symbols-rounded">search</span>
    <input type="text" id="buscador-docs-pendientes" placeholder="Buscar por ID o estado" oninput="renderDocsPendientes()">
  </div>
  <div style="display:flex;gap:0.625rem;">
    <button class="btn btn-outline">
      Filtro <span class="material-symbols-rounded" style="font-size:16px">filter_list</span>
    </button>
    <button class="btn btn-outline">
      <span class="material-symbols-rounded">download</span> Descargar
    </button>
  </div>
</div>

<!-- Tabla de filas tipo card -->
<table class="card-rows-table" id="tabla-docs-pendientes">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>No. Documento</th>
      <th>Pagaré</th>
      <th>Fecha del reclamo</th>
      <th>Documentos</th>
      <th>Opciones</th>
    </tr>
  </thead>
  <tbody id="tbody-docs-pendientes"></tbody>
</table>

<div id="docs-pendientes-empty" class="section-empty-state" style="display:none">
  <span class="material-symbols-rounded" style="font-size:2.5rem;color:var(--gray-300)">folder_off</span>
  <span style="font-weight:600;color:var(--gray-500)">No hay documentos pendientes</span>
</div>

<script>
  function renderDocsPendientes() {
    var q = (document.getElementById('buscador-docs-pendientes')
      ? document.getElementById('buscador-docs-pendientes').value : '').toLowerCase();

    var filas = [];
    reclamos.forEach(function(r) {
      if (r.documentacion !== 'Pendiente' && r.documentacion !== 'Faltan soportes') return;
      var detalle = reclamosDetalle[r.id] || [];
      detalle.forEach(function(p, idx) {
        var pagareCorto = p.pagare ? p.pagare.replace('PG-', '') : '—';
        if (q && !p.nombre.toLowerCase().includes(q) && !p.cedula.includes(q) && !r.id.includes(q)) return;
        filas.push({
          nombre:     p.nombre,
          cedula:     p.cedula,
          pagare:     pagareCorto,
          fecha:      r.fecha,
          reclamoId:  r.id,
          detalleIdx: idx
        });
      });
    });

    var tbody = document.getElementById('tbody-docs-pendientes');
    var empty = document.getElementById('docs-pendientes-empty');
    var tabla = document.getElementById('tabla-docs-pendientes');

    if (!filas.length) {
      if (tbody) tbody.innerHTML = '';
      if (empty) empty.style.display = 'flex';
      if (tabla) tabla.style.display = 'none';
      return;
    }

    if (empty) empty.style.display = 'none';
    if (tabla) tabla.style.display = '';

    if (tbody) {
      tbody.innerHTML = filas.map(function(f) {
        return '<tr>'
          + '<td><button class="col-nombre" onclick="verInfoTitular(\'' + f.reclamoId + '\',' + f.detalleIdx + ')" style="background:none;border:none;cursor:pointer;padding:0;text-align:left;font-family:\'Roboto\',sans-serif">'
          +   '<span class="material-symbols-rounded">account_circle</span>'
          +   '<span class="nombre-text" style="text-decoration:underline;text-underline-offset:3px">' + f.nombre + '</span>'
          + '</button></td>'
          + '<td>' + f.cedula + '</td>'
          + '<td>' + f.pagare + '</td>'
          + '<td>' + f.fecha + '</td>'
          + '<td><span class="badge badge-pendiente" style="gap:5px">'
          +   '<span class="material-symbols-rounded" style="font-size:13px">schedule</span>'
          +   'Pendientes'
          + '</span></td>'
          + '<td><button class="btn-accion" onclick="abrirModalDocsTitular(\'' + f.reclamoId + '\',' + f.detalleIdx + ')">'
          +   '<span class="material-symbols-rounded">visibility</span> Ver'
          + '</button></td>'
          + '</tr>';
      }).join('');
    }
  }

  renderDocsPendientes();
</script>
