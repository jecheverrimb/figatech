<!-- COMPROMISO DE DOCUMENTOS -->
<div class="breadcrumb">
  <a href="#" onclick="navTo('reclamos');return false">Reclamos</a>
  <span class="sep">/</span>
  <span>Compromiso de documentos</span>
</div>
<div class="page-header">
  <div>
    <div class="page-title">Compromiso de documentos</div>
    <div class="page-subtitle">Titulares con cobro total que requieren entrega de documentos de cartera</div>
  </div>
</div>

<!-- Filtros rápidos -->
<div style="display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap">
  <button class="pill active" id="filtro-todos" onclick="filtrarDocs('todos',this)">
    Todos <span id="count-todos" style="font-size:0.75rem;opacity:0.7"></span>
  </button>
  <button class="pill" id="filtro-pendiente" onclick="filtrarDocs('pendiente',this)">
    <span class="material-icons" style="font-size:13px;color:#d97706">schedule</span>
    Pendiente de envío <span id="count-pendiente" style="font-size:0.75rem;opacity:0.7"></span>
  </button>
  <button class="pill" id="filtro-enviados" onclick="filtrarDocs('enviados',this)">
    <span class="material-icons" style="font-size:13px;color:#16a34a">check_circle</span>
    Documentos recibidos <span id="count-enviados" style="font-size:0.75rem;opacity:0.7"></span>
  </button>
</div>

<!-- Tabla -->
<div class="table-card">
  <table id="tabla-docs">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Cédula</th>
        <th>N.° Pagaré</th>
        <th>Valor desembolsado</th>
        <th>Valor reclamado</th>
        <th>Fecha del reclamo</th>
        <th>Estado documentos</th>
      </tr>
    </thead>
    <tbody id="tbody-docs"></tbody>
  </table>
  <div id="docs-empty" class="section-empty-state" style="display:none">
    <span class="material-icons">folder_off</span>
    <span>No hay titulares en este estado</span>
  </div>
</div>

<script>
  var _filtroDocsActivo = 'todos';

  function formatCOP2(n) {
    return '$ ' + Math.round(n).toLocaleString('es-CO');
  }

  function getTitularesConCobroTotal() {
    return titulares.filter(function(t) {
      return (t.reclamos || []).some(function(r) { return r.tipo === 'Total'; });
    }).map(function(t) {
      var reclamoTotal = t.reclamos.find(function(r) { return r.tipo === 'Total'; });
      return {
        nombre: t.nombre,
        numDoc: t.numDoc,
        numPagare: t.numPagare || '—',
        valorDesembolsado: t.valorDesembolsado,
        valorReclamado: reclamoTotal ? reclamoTotal.valor : 0,
        fechaReclamo: reclamoTotal ? (reclamoTotal.fecha || '—') : '—',
        docEstado: t.documentos === 'enviados' ? 'enviados' : 'pendiente'
      };
    });
  }

  function renderDocs() {
    var todos = getTitularesConCobroTotal();

    var pendienteCount = todos.filter(function(t) { return t.docEstado === 'pendiente'; }).length;
    var enviadosCount  = todos.filter(function(t) { return t.docEstado === 'enviados';  }).length;

    document.getElementById('count-todos').textContent     = '(' + todos.length + ')';
    document.getElementById('count-pendiente').textContent = '(' + pendienteCount + ')';
    document.getElementById('count-enviados').textContent  = '(' + enviadosCount + ')';

    var lista = _filtroDocsActivo === 'pendiente' ? todos.filter(function(t) { return t.docEstado === 'pendiente'; })
              : _filtroDocsActivo === 'enviados'  ? todos.filter(function(t) { return t.docEstado === 'enviados'; })
              : todos;

    var tbody = document.getElementById('tbody-docs');
    var empty = document.getElementById('docs-empty');
    var tabla = document.getElementById('tabla-docs');

    if (!lista.length) {
      tbody.innerHTML = '';
      empty.style.display = 'flex';
      tabla.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    tabla.style.display = '';
    tbody.innerHTML = lista.map(function(t) {
      var esPendiente = t.docEstado === 'pendiente';
      var badgeHtml = esPendiente
        ? '<span class="badge badge-pendiente"><span class="material-icons" style="font-size:13px">schedule</span> Pendiente de envío</span>'
        : '<span class="badge badge-completado"><span class="material-icons" style="font-size:13px">check_circle</span> Documentos recibidos</span>';
      return '<tr>'
        + '<td><strong>' + t.nombre + '</strong></td>'
        + '<td>' + t.numDoc + '</td>'
        + '<td style="font-family:monospace;font-size:0.85rem">' + t.numPagare + '</td>'
        + '<td><strong>' + formatCOP2(t.valorDesembolsado) + '</strong></td>'
        + '<td>' + formatCOP2(t.valorReclamado) + '</td>'
        + '<td>' + t.fechaReclamo + '</td>'
        + '<td>' + badgeHtml + '</td>'
        + '</tr>';
    }).join('');
  }

  function filtrarDocs(filtro, btn) {
    _filtroDocsActivo = filtro;
    document.querySelectorAll('#sec-compromiso-docs .pill').forEach(function(p) { p.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    renderDocs();
  }

  renderDocs();
</script>
